spring.application.name=resume-ai

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resume_ai_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${JWT_SECRET:resumeai-secret-key-resumeai-secret-key-123456}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.storage.upload-dir=${FILE_UPLOAD_DIR:uploads}
app.ai.provider=${AI_PROVIDER:mock}
