<app-loader *ngIf="loading" message="Loading resume"></app-loader>

<div *ngIf="!loading && resume" class="space-y-6">
  <div class="shell-card p-6">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <p class="eyebrow">Resume Detail</p>
        <h2 class="section-title mt-2 text-4xl text-[#17172b]">{{ resume.fileName }}</h2>
        <p class="mt-3 text-sm text-[#667085]">Status: {{ resume.status }} | Uploaded: {{ resume.createdAt | date:'medium' }}</p>
      </div>
      <div class="flex gap-3">
        <a [routerLink]="['/resume', resume.id, 'analysis']" class="btn-primary">View Analysis</a>
        <a [routerLink]="['/resume', resume.id, 'jobs']" class="btn-secondary">View Job Matches</a>
      </div>
    </div>
  </div>

  <div class="shell-card p-6">
    <p class="eyebrow">Extracted Text Preview</p>
    <pre class="mt-5 whitespace-pre-wrap rounded-[24px] bg-[#f8f9ff] p-5 text-sm leading-7 text-[#667085]">{{ resume.extractedText }}</pre>
  </div>
</div>
