<app-loader *ngIf="loading" message="Loading dynamic resume editor"></app-loader>

<div *ngIf="!loading && resume" class="space-y-4">
  <app-editor-topbar
    [resume]="resume"
    [templates]="templates"
    [activeTab]="state.activeTab"
    (activeTabChange)="onActiveTabChange($event)"
    (templateChange)="onTemplateChange($event)"
    (download)="onDownload()">
  </app-editor-topbar>

  <div class="grid gap-4 xl:grid-cols-[0.42fr_0.58fr]">
    <section class="space-y-4">
      <div *ngIf="state.activeTab === 'overview'" class="shell-card p-6">
        <p class="eyebrow">Overview</p>
        <h3 class="mt-2 text-3xl font-extrabold text-[#17172b]">{{ resume.title }}</h3>
        <div class="mt-5 grid gap-4 md:grid-cols-2">
          <div class="soft-card p-5">
            <p class="text-sm text-[#667085]">Template</p>
            <p class="mt-2 text-xl font-extrabold text-[#17172b]">{{ resume.templateName }}</p>
          </div>
          <div class="soft-card p-5">
            <p class="text-sm text-[#667085]">Plan / status</p>
            <p class="mt-2 text-xl font-extrabold text-[#17172b]">{{ resume.planType }} / {{ resume.status }}</p>
          </div>
          <div class="soft-card p-5">
            <p class="text-sm text-[#667085]">Sections</p>
            <p class="mt-2 text-xl font-extrabold text-[#17172b]">{{ state.sections.length }}</p>
          </div>
          <div class="soft-card p-5">
            <p class="text-sm text-[#667085]">Edits</p>
            <p class="mt-2 text-xl font-extrabold text-[#17172b]">{{ resume.editCount }}</p>
          </div>
        </div>
      </div>

      <div *ngIf="state.activeTab === 'content'" class="grid gap-4 xl:grid-cols-[240px_1fr]">
        <app-section-sidebar
          [sections]="state.sections"
          [selectedSectionId]="state.selectedSectionId"
          (selectSection)="selectSection($event)"
          (addSection)="showAddSection = true"
          (moveUp)="moveSection($event, -1)"
          (moveDown)="moveSection($event, 1)"
          (toggleVisibility)="toggleVisibility($event)">
        </app-section-sidebar>

        <div class="space-y-4">
          <app-add-section-modal
            [open]="showAddSection"
            [templates]="sectionTemplates"
            (close)="showAddSection = false"
            (add)="addSection($event)">
          </app-add-section-modal>

          <app-section-accordion
            [section]="selectedSection"
            [content]="sectionDraft"
            (contentChange)="sectionDraft = $event"
            (save)="saveSelectedSection()"
            (remove)="removeSelectedSection()">
          </app-section-accordion>
        </div>
      </div>

      <app-customize-panel
        *ngIf="state.activeTab === 'customize'"
        [theme]="state.theme"
        [premium]="resume.planType !== 'FREE'"
        (themeChange)="onThemeChange($event)"
        (save)="saveTheme()">
      </app-customize-panel>

      <app-ai-tools-panel
        *ngIf="state.activeTab === 'ai'"
        [resume]="resume">
      </app-ai-tools-panel>

      <p *ngIf="error" class="rounded-2xl bg-[#fff1f1] px-4 py-3 text-sm font-medium text-[#ef4444]">{{ error }}</p>
    </section>

    <app-resume-editor-preview [html]="resume.generatedHtml"></app-resume-editor-preview>
  </div>
</div>
