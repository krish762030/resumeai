<div class="shell-card mx-auto max-w-[520px] p-8 md:p-10">
  <p class="eyebrow">Welcome Back</p>
  <h2 class="section-title mt-3 text-4xl text-[#17172b]">Log in to your workspace</h2>
  <p class="mt-3 text-sm leading-6 text-[#667085]">Open your dashboard, continue your builder flow, and download updated resumes.</p>

  <form class="mt-8 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <label class="mb-2 block text-sm font-semibold text-[#475467]">Email address</label>
      <input class="field" type="email" formControlName="email" placeholder="you@example.com">
    </div>

    <div>
      <div class="mb-2 flex items-center justify-between">
        <label class="block text-sm font-semibold text-[#475467]">Password</label>
        <span class="text-xs font-semibold text-[#7a81ad]">Secure access</span>
      </div>
      <input class="field" type="password" formControlName="password" placeholder="Enter your password">
    </div>

    <label class="flex items-center gap-3 rounded-2xl bg-[#f8f9ff] px-4 py-3 text-sm text-[#667085]">
      <input type="checkbox" class="h-4 w-4 accent-[#5b5cf0]">
      Keep me signed in on this device
    </label>

    <p *ngIf="error" class="rounded-2xl bg-[#fff1f1] px-4 py-3 text-sm font-medium text-[#ef4444]">{{ error }}</p>

    <button class="btn-primary w-full" type="submit" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>
  </form>

  <div class="mt-6 grid grid-cols-3 gap-3 text-center text-sm">
    <button type="button" class="btn-secondary px-4 py-3">Google</button>
    <button type="button" class="btn-secondary px-4 py-3">LinkedIn</button>
    <button type="button" class="btn-secondary px-4 py-3">GitHub</button>
  </div>

  <p class="mt-6 text-sm text-[#667085]">
    Don’t have an account?
    <a class="font-bold text-[#5b5cf0]" routerLink="/auth/register">Sign up</a>
  </p>
</div>
