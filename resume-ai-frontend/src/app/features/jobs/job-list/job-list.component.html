<div class="grid gap-4">
  <article *ngFor="let job of jobs" class="rounded-3xl border border-ink/10 bg-white/70 p-5">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <h3 class="text-xl font-extrabold text-ink">{{ job.title }}</h3>
        <p class="mt-1 text-sm text-ink/60">{{ job.company }} • {{ job.location }}</p>
      </div>
      <a [href]="job.jobUrl" target="_blank" rel="noreferrer" class="btn-secondary px-4 py-2 text-sm">Apply</a>
    </div>
    <p class="mt-4 text-sm text-ink/70">Skills: {{ job.requiredSkills | joinList }}</p>
  </article>
</div>
