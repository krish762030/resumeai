<app-loader *ngIf="loading" message="Loading editable resume"></app-loader>

<div *ngIf="!loading && resume && template && resumeDocument" class="space-y-4">
  <div class="shell-card sticky top-3 z-20 flex flex-wrap items-center justify-between gap-4 px-4 py-3">
    <div>
      <p class="eyebrow">Resume Editor</p>
      <h2 class="text-xl font-extrabold text-[#17172b]">{{ resumeDocument.title }}</h2>
    </div>

    <div class="flex flex-wrap gap-3">
      <button type="button" class="rounded-2xl px-5 py-3 font-semibold transition" [ngClass]="activeTab === 'content' ? 'bg-[#5b5cf0] text-white' : 'bg-white text-[#17172b] border border-[#dfe3f6]'" (click)="activeTab = 'content'">Content</button>
      <button type="button" class="rounded-2xl px-5 py-3 font-semibold transition" [ngClass]="activeTab === 'customize' ? 'bg-[#5b5cf0] text-white' : 'bg-white text-[#17172b] border border-[#dfe3f6]'" (click)="activeTab = 'customize'">Design</button>
      <button type="button" class="rounded-2xl px-5 py-3 font-semibold transition" [ngClass]="activeTab === 'ai' ? 'bg-[#5b5cf0] text-white' : 'bg-white text-[#17172b] border border-[#dfe3f6]'" (click)="activeTab = 'ai'">AI Tools</button>
    </div>
  </div>

  <form class="grid gap-4 xl:grid-cols-[0.46fr_0.54fr]" [formGroup]="form" (ngSubmit)="save()">
    <section class="space-y-4 xl:max-h-[calc(100vh-7.5rem)] xl:overflow-auto xl:pr-2">
      <div *ngIf="activeTab === 'content'" class="space-y-4">
        <section class="shell-card p-6">
          <h3 class="text-2xl font-extrabold text-[#17172b]">Personal details</h3>
          <div class="mt-5 grid gap-4 md:grid-cols-2" formGroupName="personal">
            <input class="field" formControlName="fullName" placeholder="Full name">
            <input class="field" formControlName="headline" placeholder="Professional headline">
            <input class="field" formControlName="email" placeholder="Email">
            <input class="field" formControlName="phone" placeholder="Phone">
            <input class="field" formControlName="location" placeholder="Location">
            <input class="field md:col-span-2" formControlName="links" placeholder="LinkedIn | GitHub | Portfolio">
            <textarea class="field md:col-span-2 min-h-[120px]" formControlName="summary" placeholder="Professional summary"></textarea>
          </div>
          <input class="field mt-4" formControlName="title" placeholder="Resume title">
        </section>

        <section class="shell-card p-6">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-2xl font-extrabold text-[#17172b]">Work experience</h3>
            <button class="btn-secondary" type="button" (click)="addExperience()">Add</button>
          </div>
          <div formArrayName="experience" class="mt-4 space-y-4">
            <div *ngFor="let group of experience.controls; let i = index" [formGroupName]="i" class="rounded-2xl border border-[#e5e7eb] bg-[#f8f9ff] p-4">
              <div class="grid gap-3 md:grid-cols-2">
                <input class="field" formControlName="position" placeholder="Role / title">
                <input class="field" formControlName="company" placeholder="Company">
                <input class="field" formControlName="location" placeholder="Location">
                <div class="grid gap-3 md:grid-cols-2">
                  <input class="field" formControlName="startDate" placeholder="Start">
                  <input class="field" formControlName="endDate" placeholder="End">
                </div>
                <input class="field md:col-span-2" formControlName="summary" placeholder="One-line context">
                <textarea class="field md:col-span-2 min-h-[110px]" formControlName="highlightsText" placeholder="Highlights, one per line"></textarea>
              </div>
              <button class="btn-secondary mt-3 px-4 py-2" type="button" (click)="removeItem(experience, i)">Remove</button>
            </div>
          </div>
        </section>

        <section class="shell-card p-6">
          <div class="grid gap-6 lg:grid-cols-2">
            <div>
              <div class="flex items-center justify-between gap-3">
                <h3 class="text-2xl font-extrabold text-[#17172b]">Skills</h3>
                <button class="btn-secondary" type="button" (click)="addSkill()">Add</button>
              </div>
              <div formArrayName="skills" class="mt-4 space-y-3">
                <div *ngFor="let group of skills.controls; let i = index" [formGroupName]="i" class="grid gap-3 md:grid-cols-[1fr_150px_auto]">
                  <input class="field" formControlName="name" placeholder="Skill">
                  <select class="field" formControlName="level">
                    <option *ngFor="let level of skillLevels" [value]="level">{{ level }}</option>
                  </select>
                  <button class="btn-secondary px-4 py-3" type="button" (click)="removeItem(skills, i)">Remove</button>
                </div>
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between gap-3">
                <h3 class="text-2xl font-extrabold text-[#17172b]">Education</h3>
                <button class="btn-secondary" type="button" (click)="addEducation()">Add</button>
              </div>
              <div formArrayName="education" class="mt-4 space-y-3">
                <div *ngFor="let group of education.controls; let i = index" [formGroupName]="i" class="rounded-2xl border border-[#e5e7eb] bg-white p-3">
                  <div class="grid gap-3 md:grid-cols-2">
                    <input class="field" formControlName="degree" placeholder="Degree">
                    <input class="field" formControlName="institution" placeholder="Institution">
                    <input class="field" formControlName="field" placeholder="Field">
                    <input class="field" formControlName="endDate" placeholder="Year">
                    <input class="field md:col-span-2" formControlName="score" placeholder="Score / GPA">
                  </div>
                  <button class="btn-secondary mt-3 px-4 py-2" type="button" (click)="removeItem(education, i)">Remove</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="shell-card p-6">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-2xl font-extrabold text-[#17172b]">Projects</h3>
            <button class="btn-secondary" type="button" (click)="addProject()">Add</button>
          </div>
          <div formArrayName="projects" class="mt-4 space-y-4">
            <div *ngFor="let group of projects.controls; let i = index" [formGroupName]="i" class="rounded-2xl border border-[#e5e7eb] bg-[#f8f9ff] p-4">
              <div class="grid gap-3 md:grid-cols-2">
                <input class="field" formControlName="name" placeholder="Project name">
                <input class="field" formControlName="role" placeholder="Role">
                <input class="field md:col-span-2" formControlName="url" placeholder="URL">
                <textarea class="field md:col-span-2 min-h-[100px]" formControlName="description" placeholder="Description"></textarea>
                <input class="field md:col-span-2" formControlName="technologiesText" placeholder="Angular, Spring Boot, MySQL">
              </div>
              <button class="btn-secondary mt-3 px-4 py-2" type="button" (click)="removeItem(projects, i)">Remove</button>
            </div>
          </div>
        </section>

        <section class="shell-card p-6">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-2xl font-extrabold text-[#17172b]">Custom sections</h3>
            <button class="btn-secondary" type="button" (click)="addCustomSection()">Add</button>
          </div>
          <div formArrayName="customSections" class="mt-4 space-y-4">
            <div *ngFor="let group of customSections.controls; let i = index" [formGroupName]="i" class="rounded-2xl border border-[#e5e7eb] bg-white p-4">
              <input class="field" formControlName="title" placeholder="Section title">
              <textarea class="field mt-3 min-h-[110px]" formControlName="itemsText" placeholder="Title | Subtitle | Description"></textarea>
              <button class="btn-secondary mt-3 px-4 py-2" type="button" (click)="removeItem(customSections, i)">Remove</button>
            </div>
          </div>
        </section>
      </div>

      <div *ngIf="activeTab === 'customize'" class="space-y-4">
        <section class="shell-card p-6">
          <h3 class="text-2xl font-extrabold text-[#17172b]">Template</h3>
          <div class="mt-5 grid gap-3 md:grid-cols-3">
            <button *ngFor="let option of templateOptions" type="button" class="rounded-2xl border px-4 py-4 text-left font-semibold transition"
                    [ngClass]="form.value.templateKey === option.key ? 'border-[#5b5cf0] bg-[#edf2ff] text-[#5b5cf0]' : 'border-[#dfe3f6] bg-white text-[#17172b]'"
                    (click)="form.patchValue({ templateKey: option.key })">
              {{ option.label }}
            </button>
          </div>
        </section>

        <section class="shell-card p-6" formGroupName="theme">
          <h3 class="text-2xl font-extrabold text-[#17172b]">Typography and layout</h3>
          <div class="mt-5 grid gap-4 md:grid-cols-2">
            <select class="field" formControlName="fontFamily">
              <option *ngFor="let font of fontOptions" [value]="font">{{ font }}</option>
            </select>
            <select class="field" formControlName="pageSize">
              <option value="A4">A4</option>
              <option value="Letter">Letter</option>
            </select>
            <label class="rounded-2xl border border-[#e5e7eb] bg-white p-4 md:col-span-2">
              <span class="text-sm font-semibold text-[#475467]">Section spacing</span>
              <input class="mt-3 w-full" type="range" min="10" max="34" step="1" formControlName="sectionSpacing">
            </label>
          </div>
        </section>

        <section class="shell-card p-6" formGroupName="theme">
          <h3 class="text-2xl font-extrabold text-[#17172b]">Colors</h3>
          <div class="mt-5 grid gap-4 md:grid-cols-2">
            <label class="field flex items-center gap-3">
              <input type="color" formControlName="primaryColor">
              <span>Primary</span>
            </label>
            <label class="field flex items-center gap-3">
              <input type="color" formControlName="secondaryColor">
              <span>Secondary</span>
            </label>
            <label class="field flex items-center gap-3 md:col-span-2">
              <input type="color" formControlName="textColor">
              <span>Text</span>
            </label>
          </div>
          <div class="mt-5 flex flex-wrap gap-3">
            <button *ngFor="let colorTheme of colorThemes" type="button" class="rounded-2xl border border-[#e5e7eb] bg-white px-4 py-3 text-sm font-semibold text-[#17172b]" (click)="applyColorTheme(colorTheme)">
              <span class="mr-2 inline-block h-3 w-3 rounded-full" [style.background]="colorTheme.primaryColor"></span>
              <span class="mr-2 inline-block h-3 w-3 rounded-full" [style.background]="colorTheme.secondaryColor"></span>
              {{ colorTheme.name }}
            </button>
          </div>
        </section>
      </div>

      <div *ngIf="activeTab === 'ai'" class="shell-card p-6">
        <h3 class="text-2xl font-extrabold text-[#17172b]">AI Tools</h3>
      </div>

      <p *ngIf="error" class="rounded-2xl bg-[#fff1f1] px-4 py-3 text-sm font-medium text-[#ef4444]">{{ error }}</p>

      <div class="flex justify-end">
        <button class="btn-primary" type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save Changes' }}</button>
      </div>
    </section>

    <section class="shell-card overflow-auto p-4 xl:sticky xl:top-24 xl:max-h-[calc(100vh-7rem)]">
      <app-resume-template-renderer
        [document]="resumeDocument"
        [editable]="true"
        (documentChange)="onInlineDocumentChange($event)">
      </app-resume-template-renderer>
    </section>
  </form>
</div>

<div *ngIf="!loading && (!resume || !template || !resumeDocument)" class="shell-card p-8">
  <p class="text-sm font-medium text-[#ef4444]">{{ error || 'Resume draft could not be opened.' }}</p>
  <a routerLink="/templates" class="btn-secondary mt-4 inline-flex">Back to templates</a>
</div>
